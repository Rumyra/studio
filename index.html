<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Rumyra's Studio</title>
  <meta name="description" content="A place to collect all the things Ruth John has built, both digital and physical.">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:title" content="Rumyra's Studio">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://studio.rumyra.com">
  <meta property="og:image" content="rumyra.png">

  <link rel="apple-touch-icon" href="https://rumyra.github.io/rumyra.css/icon.png">
  <!-- Place favicon.ico in the root directory -->

  <link rel="stylesheet" href="https://rumyra.github.io/rumyra.css/rumyra.css">
  <script src="assets/components.js"></script>

  <meta name="theme-color" content="#a681c4">

  <style>
    #work-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: auto;
      grid-gap: var(--xDoubleGap);
    }
    #work-list article:nth-of-type(5n-1) {--primCol: var(--orange);}
    #work-list article:nth-of-type(5n-2) {--primCol: var(--blue);}
    #work-list article:nth-of-type(5n-3) {--primCol: var(--green);}
    #work-list article:nth-of-type(5n-4) {--primCol: var(--pink);}
    #work-list .image--regular {
      width: 100%; height: 20vw;
    }
</style>
</head>
<body><div class="wrapper">
  <site-header></site-header>

  <main>
    <article>
      <header>
        <h1>Rumyra's Studio</h1>
        <h2 class="heading--small">The small corner of the web for the things I make</h2>
      </header>
      <hr />

      <section id="work-list"></section><!-- work-list -->
    </article>
  </main>

  <site-footer gh="https://github.com/Rumyra/studio"></site-footer>

</div><!-- /wrapper -->

<script>
  fetch('/demo-list.json')
    .then(r => r.json())
    .then(demos => {
      const list = document.querySelector('#work-list');
      for (const demo of demos) {
        const article = document.createElement('article');

        const h3 = document.createElement('h3');
        h3.textContent = demo.title;

        const figure = document.createElement('figure');
        figure.className = 'image--regular';
        const img = document.createElement('img');
        img.src = demo.image;
        img.alt = demo.imageAlt;
        figure.appendChild(img);

        const p = document.createElement('p');
        p.textContent = demo.desc;

        const a = document.createElement('a');
        a.href = demo.url;
        a.textContent = `Go to the ${demo.title} page \u21D7`;

        article.appendChild(h3);
        article.appendChild(figure);
        article.appendChild(p);
        article.appendChild(a);
        list.appendChild(article);
      }
    });
</script>

</body>
</html>
